[[mods]]
modId="fluidcouriers"
version="1.0.0"
displayName="Fluid Couriers (FluidLogistics x PackageCouriers Compat)"
authors="fluidcouriers"
description='''
Compatibility mod between Create More: Package Couriers (cmpackagecouriers)
and FluidLogistics.

Fixes the Portable Stock Ticker so it correctly displays fluids from a
FluidPackager-linked inventory (instead of Compressed Tank items) and
allows ordering those fluids just like a stationary Stock Ticker does.
'''

